<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Zaply</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; }
  .auth-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    padding: 38px 42px; width: 400px; box-shadow: 0 14px 40px rgba(15,30,24,0.08);
  }
  .auth-card h1 { font-size: 24px; margin-bottom: 4px; }
  .auth-sub { font-size: 13.5px; color: var(--ink-3); margin-bottom: 22px; }
  .auth-card .field { margin-bottom: 14px; }
  .auth-card button.primary {
    width: 100%; background: var(--brand-600); color: #fff; border: none; font: inherit;
    font-weight: 600; font-size: 15px; padding: 12px; border-radius: 10px; cursor: pointer;
    margin-top: 6px;
  }
  .auth-card button.primary:hover { background: var(--brand-500); }
  .switch { margin-top: 16px; font-size: 13px; color: var(--ink-3); text-align: center; }
  .switch a { color: var(--brand-600); font-weight: 600; cursor: pointer; }
  .auth-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }
  .signup-only { display: none; }
  body.mode-signup .signup-only { display: block; }
</style>
</head>
<body>
  <div class="auth-card">
    <div class="brand" style="margin-bottom:18px"><span class="brand-mark"></span><span class="brand-name" style="color:var(--ink)">Inbox<span class="brand-accent">AI</span></span></div>
    <h1 id="title">Welcome back</h1>
    <p class="auth-sub" id="sub">Sign in to your WhatsApp AI inbox.</p>
    <label class="field signup-only"><span>Business name</span><input id="bizName" placeholder="e.g. Glynx Store" /></label>
    <label class="field"><span>Email</span><input id="email" type="email" autocomplete="email" /></label>
    <label class="field"><span>Password</span><input id="password" type="password" autocomplete="current-password" /></label>
    <button class="primary" id="submitBtn">Sign in</button>
    <div class="auth-error" id="err"></div>
    <div class="switch" id="switchRow">New here? <a id="switchLink">Start your free 7-day trial</a></div>
  </div>
  <div id="poweredBy" style="margin-top:16px;font-size:12px;color:var(--ink-4);text-align:center;display:none">Powered by <strong>Zaply</strong></div>
<script>
let mode = new URLSearchParams(location.search).get("mode") === "signup" ? "signup" : "login";
let brandSub = "Sign in to your WhatsApp AI inbox.";

// White-label: theme the login page by its domain
(async function applyBrand() {
  try {
    const b = await (await fetch("/api/branding/public?host=" + encodeURIComponent(location.hostname))).json();
    if (b.hue != null) document.documentElement.style.setProperty("--brand-h", b.hue);
    const name = b.app_name || "Zaply";
    document.title = "Sign in — " + name;
    if (b.login_subtitle) brandSub = b.login_subtitle;
    const brandEl = document.querySelector(".auth-card .brand");
    if (brandEl) {
      brandEl.innerHTML = b.logo
        ? `<img src="${b.logo}" alt="${name}" style="height:32px;max-width:170px;object-fit:contain"/>`
        : `<span class="brand-mark"></span><span class="brand-name" style="color:var(--ink)">${name}</span>`;
    }
    document.getElementById("poweredBy").style.display = b.powered_by ? "" : "none";
    render();
  } catch {}
})();
function render() {
  document.body.classList.toggle("mode-signup", mode === "signup");
  document.getElementById("title").textContent = mode === "signup" ? "Start your free trial" : "Welcome back";
  document.getElementById("sub").textContent = mode === "signup"
    ? "7 days free. No credit card needed."
    : brandSub;
  document.getElementById("submitBtn").textContent = mode === "signup" ? "Create account" : "Sign in";
  document.getElementById("switchRow").innerHTML = mode === "signup"
    ? 'Already have an account? <a id="switchLink">Sign in</a>'
    : 'New here? <a id="switchLink">Start your free 7-day trial</a>';
  document.getElementById("switchLink").onclick = () => { mode = mode === "signup" ? "login" : "signup"; render(); };
}
render();

document.getElementById("submitBtn").addEventListener("click", async () => {
  const err = document.getElementById("err");
  err.textContent = "";
  try {
    const res = await fetch(`/api/auth/${mode}`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        businessName: document.getElementById("bizName").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Something went wrong");
    localStorage.setItem("token", data.token);
    location.href = "/app";
  } catch (e) {
    err.textContent = e.message;
  }
});
document.addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("submitBtn").click(); });
</script>
</body>
</html>
